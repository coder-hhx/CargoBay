<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrateBay</title>
    <script>
      // Debug: catch any unhandled errors and display them visually
      window.__CRATEBAY_ERRORS = [];
      window.onerror = function(msg, url, line, col, error) {
        window.__CRATEBAY_ERRORS.push({msg, url, line, col, error: error ? error.stack : ''});
        var el = document.getElementById('__debug_errors');
        if (!el) {
          el = document.createElement('pre');
          el.id = '__debug_errors';
          el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:16px;font-size:12px;max-height:50vh;overflow:auto;';
          document.body.appendChild(el);
        }
        el.textContent += '[ERROR] ' + msg + '\n  at ' + url + ':' + line + ':' + col + '\n' + (error ? error.stack : '') + '\n\n';
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.__CRATEBAY_ERRORS.push({type:'unhandledrejection', reason: e.reason ? (e.reason.stack || String(e.reason)) : 'unknown'});
        var el = document.getElementById('__debug_errors');
        if (!el) {
          el = document.createElement('pre');
          el.id = '__debug_errors';
          el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:16px;font-size:12px;max-height:50vh;overflow:auto;';
          document.body.appendChild(el);
        }
        el.textContent += '[UNHANDLED REJECTION] ' + (e.reason ? (e.reason.stack || String(e.reason)) : 'unknown') + '\n\n';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
