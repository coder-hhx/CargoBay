# CrateBay Project Metadata
# This file drives AI Agent behavior across machines.
# Agents read this on startup to understand project context.

project:
  name: CrateBay
  identity: "AI-native open-source desktop development control plane"
  version: 2.0.0-rewrite
  git_branch: rewrite/v2
  repo_url: "git@github.com:coder-hhx/CrateBay.git"

current_stage:
  name: "documentation"
  phase_number: 1
  started: "2026-03-20"

  stage_teams:
    documentation:
      members: [architect, product-manager, frontend-architect]
      lead: architect
    development:
      members: [team-lead, frontend-dev, backend-dev, ai-engineer, runtime-dev, tester]
      lead: team-lead
    testing:
      members: [team-lead, frontend-dev, backend-dev, tester, doc-keeper]
      lead: team-lead

architecture:
  framework: "Tauri v2"
  frontend: "React 19 + shadcn/ui + Radix + Tailwind CSS v4 + Zustand + Streamdown"
  backend: "Rust (stable) + bollard 0.18 + rusqlite"
  agent_core: "@mariozechner/pi-agent-core + @mariozechner/pi-ai"
  type_contract: "tauri-specta"
  storage: "SQLite at ~/.cratebay/cratebay.db"
  runtime: "Built-in (macOS VZ.framework / Linux KVM / Windows WSL2)"

workflow:
  process: "spec-driven"
  documentation_first: true
  approval_gates:
    - "spec-review"
    - "final-acceptance"
  human_involvement: "moderate"  # needs: requirements + spec review + acceptance

documentation:
  version: 1.0.0
  must_read:
    - AGENTS.md
    - docs/workflow/agent-team-workflow.md
    - docs/progress.md
  critical_specs:
    - docs/specs/architecture.md
    - docs/specs/backend-spec.md
    - docs/specs/frontend-spec.md
    - docs/specs/agent-spec.md

tools:
  mcp_servers:
    - shadcn  # shadcn/ui component browsing and installation
    - tauri   # Tauri app UI testing and debugging (Step 4+)
  skills:
    - "shadcn/ui"      # shadcn component knowledge
    - "tauri-skills"    # Tauri best practices (51 skills)

# Cross-machine session recovery
last_session:
  date: "2026-03-20"
  progress_file: "docs/progress.md"
  active_agents: [architect, product-manager, frontend-architect]
  resume_summary: "Phase 1 started: creating documentation system (16 docs)"
