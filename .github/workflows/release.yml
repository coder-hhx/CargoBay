name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: crates/cratebay-gui/pnpm-lock.yaml

      - name: Install Linux system dependencies
        run: |
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preflight

      - name: Docker runtime info
        run: docker version && docker info

      - name: Run release-readiness gate
        run: ./scripts/release-readiness.sh
        env:
          CRATEBAY_RELEASE_STAGE: ${{ startsWith(github.ref_name, 'v1.') && 'ga' || 'preview' }}

  # -----------------------------------------------------------
  # Build release binaries
  # -----------------------------------------------------------
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            cli-artifact: cratebay-macos-aarch64
            ext: ""
          - name: macOS-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            cli-artifact: cratebay-macos-x86_64
            ext: ""
          - name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli-artifact: cratebay-linux-x86_64
            ext: ""
          - name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cli-artifact: cratebay-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Linux: system libraries required by Tauri / WebKitGTK
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # -- Build CLI --
      - name: Build CLI (release)
        run: cargo build --release --target ${{ matrix.target }} -p cratebay-cli

      # -- Upload CLI binary --
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cli-artifact }}
          path: target/${{ matrix.target }}/release/cratebay${{ matrix.ext }}
          if-no-files-found: error

  # -----------------------------------------------------------
  # Build Tauri desktop app (GUI)
  # -----------------------------------------------------------
  build-gui:
    name: Tauri App (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: cratebay-gui-macos-aarch64
          - name: macOS-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: cratebay-gui-macos-x86_64
          - name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cratebay-gui-linux-x86_64
          - name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cratebay-gui-windows-x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Build CrateBay Runtime assets (Windows WSL2 only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          arch="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          bash scripts/build-runtime-assets-wsl.sh "${arch}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS runtime asset build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install squashfs zig
          cargo install cargo-zigbuild --locked --force

      - name: Add Linux musl target for bundled runtime
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          rustup target add "${arch}-unknown-linux-musl"

      - name: Build CrateBay Runtime assets (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          bash scripts/build-runtime-assets-alpine.sh "${arch}"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: crates/cratebay-gui/pnpm-lock.yaml

      # Linux: system libraries required by Tauri / WebKitGTK
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            qemu-system-x86 \
            squashfs-tools

      - name: Install Zig (Linux only)
        if: runner.os == 'Linux'
        run: bash scripts/install-zig.sh

      - name: Install cargo-zigbuild (Linux only)
        if: runner.os == 'Linux'
        run: cargo install cargo-zigbuild --locked --force

      - name: Add Linux musl target for bundled runtime (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          arch="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          rustup target add "${arch}-unknown-linux-musl"

      - name: Build CrateBay Runtime assets (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          arch="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          bash scripts/build-runtime-assets-alpine.sh "${arch}"
          bash scripts/build-runtime-assets-linux.sh "${arch}"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-release-${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: crates/cratebay-gui
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Apple Developer ID)
          # Required secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #                   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
          #                   APPLE_TEAM_ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (Authenticode / Azure Trusted Signing)
          # Required secrets: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: crates/cratebay-gui
          args: --target ${{ matrix.target }}

      - name: Verify release bundles
        shell: bash
        run: ./scripts/verify-release-artifacts.sh --mode ci --os "${{ runner.os }}" --target "${{ matrix.target }}"

      # Tauri bundles end up in target/<target>/release/bundle/
      - name: Upload Tauri bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  # -----------------------------------------------------------
  # Create GitHub Release & attach assets
  # -----------------------------------------------------------
  release:
    name: Publish Release
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "cratebay" \) -exec sha256sum {} + | sort > ../SHA256SUMS.txt
          cd ..
          echo "## SHA256 Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat SHA256SUMS.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify downloaded release artifacts
        run: ./scripts/verify-release-artifacts.sh --mode downloaded --artifacts-root artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
